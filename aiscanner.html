<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detektor Gambar AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        input[type="file"] {
            margin: 20px 0;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #preview {
            max-width: 100%;
            margin-top: 15px;
            border-radius: 5px;
            display: none;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
        }
        .loading {
            color: #ff9800;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Pendeteksi Gambar AI</h2>
        <p>Unggah gambar untuk mengecek apakah ini buatan manusia atau AI.</p>
        
        <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">
        <img id="preview" alt="Preview Gambar">
        
        <button id="analyzeBtn" onclick="analyzeImage()">Analisis Gambar</button>
        
        <div id="result"></div>
    </div>

    <script>
        const HUGGINGFACE_TOKEN = "MASUKKAN_TOKEN_BARUMU_DI_SINI"; // Jangan lupa isi token baru ya!

        function previewImage() {
            const file = document.getElementById("imageInput").files[0];
            const preview = document.getElementById("preview");
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        }

        async function analyzeImage() {
            const fileInput = document.getElementById("imageInput");
            const resultDiv = document.getElementById("result");
            const btn = document.getElementById("analyzeBtn");

            if (fileInput.files.length === 0) {
                alert("Silakan pilih gambar terlebih dahulu!");
                return;
            }

            const file = fileInput.files[0];
            resultDiv.innerHTML = "<span class='loading'>Sedang menganalisis... Mohon tunggu.</span>";
            btn.disabled = true;

            try {
                const arrayBuffer = await file.arrayBuffer();

                const response = await fetch(
                    "https://api-inference.huggingface.co/models/umm-maybe/AI-image-detector",
                    {
                        headers: { 
                            "Authorization": `Bearer ${HUGGINGFACE_TOKEN}`, 
                            "Content-Type": file.type // Diperbaiki di sini
                        },
                        method: "POST",
                        body: arrayBuffer,
                    }
                );

                const data = await response.json();

                if (data.error && data.estimated_time) {
                    resultDiv.innerHTML = `<span style="color:red;">Model sedang disiapkan oleh server. Coba lagi dalam ${Math.round(data.estimated_time)} detik.</span>`;
                    btn.disabled = false;
                    return;
                }

                if (!response.ok) {
                    throw new Error(data.error || "Gagal memproses gambar dari server");
                }

                // Ambil prediksi tertinggi
                const prediksi = data[0];
                const persentase = (prediksi.score * 100).toFixed(2);
                const status = prediksi.label === "human" ? "Buatan Manusia 🧍" : "Buatan AI 🤖";
                const warna = prediksi.label === "human" ? "green" : "red";

                resultDiv.innerHTML = `Hasil: <span style="color:${warna}">${status}</span><br>Keyakinan: ${persentase}%`;

            } catch (error) {
                // Pesan error dipertajam agar lebih jelas jika gagal lagi
                resultDiv.innerHTML = `<span style="color:red;">Error: ${error.message}.<br>Cek koneksi internet atau coba beberapa saat lagi.</span>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
