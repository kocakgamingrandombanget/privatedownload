<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Changelog - Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Roboto', 'sans-serif'] },
                    colors: {
                        m3: {
                            surface: '#FEF7FF', surfaceContainerLowest: '#FFFFFF', surfaceContainerLow: '#F7F2FA', 
                            surfaceContainer: '#F3EDF7', surfaceContainerHigh: '#ECE6F0', surfaceContainerHighest: '#E6E0E9',
                            primary: '#6750A4', onPrimary: '#FFFFFF', primaryContainer: '#EADDFF', onPrimaryContainer: '#21005D',
                            secondary: '#625B71', onSecondary: '#FFFFFF', secondaryContainer: '#E8DEF8', onSecondaryContainer: '#1D192B',
                            tertiaryContainer: '#FFD8E4', onTertiaryContainer: '#31111D',
                            onSurface: '#1D1B20', onSurfaceVariant: '#49454F', outline: '#79747E', outlineVariant: '#CAC4D0'
                        }
                    }
                }
            }
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #F3EDF7; }
        .accordion-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s cubic-bezier(0.2, 0, 0, 1); }
        .accordion-wrapper.open { grid-template-rows: 1fr; }
        .accordion-inner { overflow: hidden; opacity: 0; transition: opacity 0.3s cubic-bezier(0.2, 0, 0, 1); }
        .accordion-wrapper.open .accordion-inner { opacity: 1; }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CAC4D0; border-radius: 8px; border: 2px solid #F7F2FA; }
        ::-webkit-scrollbar-thumb:hover { background: #79747E; }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="text-m3-onSurface font-sans antialiased min-h-screen pb-20">
    <header class="bg-m3-surfaceContainerLowest/90 backdrop-blur-md fixed w-full top-0 z-50 h-16 flex items-center transition-all shadow-sm border-b border-m3-outlineVariant/50">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 w-full flex items-center justify-between">
            <div class="flex items-center gap-3 text-m3-onSurface">
                <div class="w-10 h-10 rounded-full flex items-center justify-center text-m3-primary"><i class="fa-solid fa-clock-rotate-left text-xl"></i></div>
                <h1 class="text-[22px] font-medium tracking-tight text-m3-onSurface">Changelog</h1>
            </div>
            <div class="flex items-center gap-2">
                <!-- Segmented Control modern pengganti dropdown -->
                <div class="flex p-1 bg-m3-surfaceContainerHigh rounded-full border border-m3-outlineVariant/30 shadow-inner">
                    <button onclick="setViewType('public')" id="view-btn-public" class="px-4 py-1.5 text-sm font-medium rounded-full transition-all bg-m3-secondaryContainer text-m3-onSecondaryContainer shadow-sm">Public</button>
                    <button onclick="setViewType('pro')" id="view-btn-pro" class="px-4 py-1.5 text-sm font-medium rounded-full transition-all text-m3-onSurfaceVariant hover:text-m3-onSurface">Pro</button>
                </div>
            </div>
        </div>
    </header>
    <main class="max-w-4xl mx-auto px-4 sm:px-6 pt-28">
        <div class="mb-8 relative max-w-2xl">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 transform -translate-y-1/2 text-m3-onSurfaceVariant"></i>
            <input type="text" id="search-input" oninput="render()" placeholder="Search versions, features, or fixes..." class="w-full pl-12 pr-5 py-4 bg-m3-surfaceContainerLowest border border-m3-outlineVariant/60 shadow-sm focus:shadow-md text-m3-onSurface rounded-full focus:outline-none transition-all placeholder-m3-onSurfaceVariant/70 text-base focus:border-m3-primary">
        </div>
        <div id="empty-state" class="hidden flex-col items-center justify-center py-24 text-m3-onSurfaceVariant">
            <div class="w-24 h-24 bg-m3-surfaceContainerLowest border border-m3-outlineVariant/50 shadow-sm rounded-full flex items-center justify-center mb-6 text-m3-primary"><i class="fa-solid fa-folder-open text-4xl"></i></div>
            <p class="text-[22px] font-medium text-m3-onSurface">No history found</p>
        </div>
        <div id="changelog-container" class="space-y-5"></div>
    </main>
    <script>
        const changelogs = ${staticDataStr}; 
        let activeAccordionId = null; 
        let currentViewType = 'public';

        document.addEventListener('DOMContentLoaded', () => { render(); });

        function setViewType(type) {
            currentViewType = type;
            const btnPublic = document.getElementById('view-btn-public');
            const btnPro = document.getElementById('view-btn-pro');
            
            if(type === 'public') {
                btnPublic.className = "px-4 py-1.5 text-sm font-medium rounded-full transition-all bg-m3-secondaryContainer text-m3-onSecondaryContainer shadow-sm";
                btnPro.className = "px-4 py-1.5 text-sm font-medium rounded-full transition-all text-m3-onSurfaceVariant hover:text-m3-onSurface";
            } else {
                btnPro.className = "px-4 py-1.5 text-sm font-medium rounded-full transition-all bg-m3-secondaryContainer text-m3-onSecondaryContainer shadow-sm";
                btnPublic.className = "px-4 py-1.5 text-sm font-medium rounded-full transition-all text-m3-onSurfaceVariant hover:text-m3-onSurface";
            }
            render();
        }

        function formatDate(dateStr) { return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }); }
        function getVersionTag(versionStr) {
            const match = versionStr.match(/v?(\d+)\.(\d+)\.(\d+)/i);
            if (match) {
                const major = parseInt(match[1]), minor = parseInt(match[2]), patch = parseInt(match[3]);
                if (minor === 0 && patch === 0) return `<span class="px-3 py-1 rounded-full text-[11px] font-medium bg-m3-primaryContainer text-m3-onPrimaryContainer tracking-wide">Major Release</span>`;
                else if (patch === 0) return `<span class="px-3 py-1 rounded-full text-[11px] font-medium bg-m3-tertiaryContainer text-m3-onTertiaryContainer tracking-wide">Minor Update</span>`;
                else return `<span class="px-3 py-1 rounded-full text-[11px] font-medium bg-m3-surfaceContainerHighest text-m3-onSurfaceVariant tracking-wide">Patch Fix</span>`;
            }
            return `<span class="px-3 py-1 rounded-full text-[11px] font-medium bg-m3-surfaceContainerHighest text-m3-onSurfaceVariant tracking-wide">Update</span>`;
        }
        function render() {
            const container = document.getElementById('changelog-container'), emptyState = document.getElementById('empty-state'), searchTerm = document.getElementById('search-input') ? document.getElementById('search-input').value.toLowerCase() : '';
            
            container.innerHTML = '';
            
            let filteredLogs = changelogs.filter(log => !log.tags || log.tags.includes(currentViewType));
            filteredLogs = filteredLogs.filter(log => log.version.toLowerCase().includes(searchTerm) || (log.added && log.added.toLowerCase().includes(searchTerm)) || (log.fixed && log.fixed.toLowerCase().includes(searchTerm)) || (log.removed && log.removed.toLowerCase().includes(searchTerm)));
            
            if (filteredLogs.length === 0) { emptyState.classList.remove('hidden'); emptyState.classList.add('flex'); } else { emptyState.classList.add('hidden'); emptyState.classList.remove('flex'); }
            filteredLogs.sort((a, b) => new Date(b.date) - new Date(a.date));
            let activeId = activeAccordionId; if (searchTerm !== '' && filteredLogs.length > 0) activeId = 'search_mode'; else if (activeId === null && filteredLogs.length > 0) activeId = filteredLogs[0].id;
            filteredLogs.forEach(log => {
                const isOpen = activeId === log.id || activeId === 'search_mode';
                let addedHtml = buildList(log.added, 'fa-rocket', 'New', 'bg-emerald-100 text-emerald-900', 'bg-emerald-600'), fixedHtml = buildList(log.fixed, 'fa-bug', 'Fix', 'bg-blue-100 text-blue-900', 'bg-blue-600'), removedHtml = buildList(log.removed, 'fa-trash-can', 'Remove', 'bg-rose-100 text-rose-900', 'bg-rose-600');
                container.insertAdjacentHTML('beforeend', `
                    <div class="bg-m3-surfaceContainerLowest border border-m3-outlineVariant/60 shadow-sm hover:shadow-md rounded-[24px] overflow-hidden transition-all duration-300">
                        <button onclick="toggleAccordion(${log.id})" class="w-full flex justify-between items-center px-6 py-5 focus:outline-none transition-colors group hover:bg-m3-surfaceContainerLow">
                            <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-4 text-left">
                                <div class="flex flex-col items-start gap-1">
                                    <span class="text-xl font-medium text-m3-onSurface flex items-center gap-3"><i class="fa-solid fa-tag text-m3-primary/70 text-base"></i> ${log.version}</span>
                                </div>
                                <div class="flex items-center gap-3 ml-7 sm:ml-4">${getVersionTag(log.version)}<span class="text-sm text-m3-onSurfaceVariant/80 font-normal hidden sm:block">•</span><span class="text-sm text-m3-onSurfaceVariant font-normal mt-1 sm:mt-0">${formatDate(log.date)}</span></div>
                            </div>
                            <div class="flex items-center gap-2 sm:gap-4 pl-4">
                                <div class="w-10 h-10 flex items-center justify-center text-m3-onSurfaceVariant group-hover:text-m3-onSurface group-hover:bg-m3-surfaceContainerHigh transition-colors rounded-full border border-transparent group-hover:border-m3-outlineVariant/40">
                                    <i id="icon-${log.id}" class="fa-solid fa-chevron-down transform transition-transform duration-300 ${isOpen ? 'rotate-180 text-m3-primary' : ''}"></i>
                                </div>
                            </div>
                        </button>
                        <div id="content-${log.id}" class="accordion-wrapper ${isOpen ? 'open' : ''}">
                            <div class="accordion-inner">
                                <div class="px-6 pb-7 pt-1 sm:ml-2 border-t border-m3-outlineVariant/20">
                                    ${(addedHtml || fixedHtml || removedHtml) ? addedHtml + fixedHtml + removedHtml : '<p class="text-m3-onSurfaceVariant italic mt-4 text-sm ml-7">No detailed notes available.</p>'}
                                </div>
                            </div>
                        </div>
                    </div>`);
            });
        }
        function buildList(text, iconClass, badgeLabel, badgeClass, dotColorClass) {
            if (!text || text.trim() === '') return '';
            const items = text.split('\n').filter(i => i.trim() !== ''); if (items.length === 0) return '';
            const listItems = items.map(item => `<li class="relative pl-7 text-m3-onSurfaceVariant text-[15px] sm:text-base mb-3 leading-relaxed"><span class="absolute left-2 top-[10px] w-1.5 h-1.5 rounded-full ${dotColorClass}"></span>${item}</li>`).join('');
            return `<div class="mt-6 first:mt-3 ml-1 sm:ml-6"><span class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-full ${badgeClass} mb-4"><i class="fa-solid ${iconClass}"></i> ${badgeLabel}</span><ul class="ml-1">${listItems}</ul></div>`;
        }
        function toggleAccordion(id) {
            const wrapper = document.getElementById(`content-${id}`), icon = document.getElementById(`icon-${id}`);
            if (wrapper.classList.contains('open')) { wrapper.classList.remove('open'); icon.classList.remove('rotate-180', 'text-m3-primary'); activeAccordionId = null; } 
            else { 
                if (activeAccordionId && activeAccordionId !== id) { const oldWrapper = document.getElementById(`content-${activeAccordionId}`), oldIcon = document.getElementById(`icon-${activeAccordionId}`); if (oldWrapper) { oldWrapper.classList.remove('open'); if(oldIcon) oldIcon.classList.remove('rotate-180', 'text-m3-primary'); } }
                wrapper.classList.add('open'); icon.classList.add('rotate-180', 'text-m3-primary'); activeAccordionId = id; 
            }
        }
    </script>
</body>
</html>
